params:
  w0_fld:
    prior:
      min: -2.0
      max: 2.0
    ref:
      dist: norm
      loc: -0.5
      scale: 0.2
    proposal: 0.05
    latex: w_0
    renames:
    - w
  wa_fld:
    prior:
      min: -2.0
      max: 2.0
    ref:
      dist: norm
      loc: -1.0
      scale: 0.5
    proposal: 0.05
    latex: w_a
    renames:
    - wa
  omega_b:
    prior:
      min: 0.021
      max: 0.023
    ref:
      dist: norm
      loc: 0.022633
      scale: 0.001
    proposal: 0.0001
    renames:
    - omegabh2
  omega_cdm:
    prior:
      min: 0.11
      max: 0.13
    ref:
      dist: norm
      loc: 0.1184
      scale: 0.01
    proposal: 0.0001
    renames:
    - omegach2
  logA:
    prior:
      min: 2.98
      max: 3.1
    ref:
      dist: norm
      loc: 3.040776555
      scale: 0.001
    proposal: 0.001
    latex: r'\log(10^{10} A_\mathrm{s})'
    drop: true
  A_s:
    value: 'lambda logA: 1e-10*np.exp(logA)'
    latex: r'A_\mathrm{s}'
    derived: true
    renames:
    - As
  n_s:
    prior:
      min: 0.94
      max: 0.99
    ref:
      dist: norm
      loc: 0.9652909209
      scale: 0.002
    proposal: 0.002
    latex: r'n_\mathrm{s}'
    renames:
    - ns
  tau_reio:
    latex: r'\tau_\mathrm{reio}'
    prior:
      min: 0.02
      max: 0.08
    ref:
      dist: norm
      loc: 0.05546101493
      scale: 0.003
    proposal: 0.003
    renames:
    - tau
  H0:
    prior:
      min: 60
      max: 72
    ref:
      dist: norm
      loc: 66.0
      scale: 1.0
    proposal: 0.5
  chi2__BAO:
    latex: \chi^2_\mathrm{BAO}
    derived: true
  chi2__CMB:
    latex: \chi^2_\mathrm{CMB}
    derived: true
  chi2_total:
    derived: 'lambda chi2__BAO, chi2__CMB: chi2__BAO + chi2__CMB '
    latex: \chi^2_\mathrm{total}
  omega_m:
    latex: \Omega_\mathrm{m}
    derived: 'lambda omega_cdm, omega_b, H0: (omega_cdm + omega_b) / (H0 / 100.0)**2'
  rdrag:
    latex: r_\mathrm{drag}
    derived: true
    renames:
    - rs_drag
  hrd:
    latex: hr_d
    derived: 'lambda H0, rdrag: H0/100 * rdrag'
  sigma8:
    latex: \sigma_8
    derived: true
  theta_s_100:
    latex: 100\theta_s
    derived: true
  A_planck:
    prior:
      dist: norm
      loc: 1
      scale: 0.0025
    ref:
      dist: norm
      loc: 1
      scale: 0.002
    proposal: 0.0005
    latex: y_\mathrm{cal}
    renames: calPlanck
